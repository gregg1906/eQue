services:
  db:
    image: postgres:15
    container_name: eque_postgres
    environment:
      - POSTGRES_USER=admin
      - POSTGRES_PASSWORD=jebaccity
      - POSTGRES_DB=eque_db
    ports:
      - "5432:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U admin -d eque_db"]
      interval: 5s
      timeout: 5s
      retries: 5

  redis_cache:
    image: redis:7
    container_name: eque_redis
    ports:
      - "6379:6379"

  backend:
    build:
      context: ./backend
    container_name: eque_backend
    ports:
      - "8000:8000"
    environment:
      - DATABASE_URL=postgresql://admin:jebaccity@db:5432/eque_db
      - REDIS_URL=redis://redis_cache:6379
    depends_on:
      db:
        condition: service_healthy
      redis_cache:
        condition: service_started
    volumes:
      - ./backend:/app

  web:
    build:
      context: ./web
    container_name: eque_web
    ports:
      - "5173:5173"
    environment:
      - VITE_API_URL=http://localhost:8000
    depends_on:
      - backend
    volumes:
      - ./web:/app
      - /app/node_modules

  mobile:
    build:
      context: ./mobile
    container_name: eque_mobile
    ports:
      - "3000:3000"
    volumes:
      - ./mobile:/app
      - /app/.dart_tool
      - /app/build

volumes:
  pgdata:
